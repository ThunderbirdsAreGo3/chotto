<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Campus AR展示サンプル</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      model-viewer {
        width: 100%;
        height: 80vh; /* 画面の8割を3D表示に */
        background-color: #f0f0f0;
      }
      .controls {
        padding: 20px;
        text-align: center;
      }
      .ar-button {
        background-color: #4285f4;
        color: white;
        padding: 10px 20px;
        border-radius: 5px;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <model-viewer
      src="assets/sample.glb"
      ar
      ar-modes="scene-viewer quick-look"
      camera-controls
      poster="assets/poster.webp"
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      alt="学生制作の3Dキャラクター"
      auto-rotate
    >
      <button
        slot="ar-button"
        style="
          background-color: white;
          border-radius: 4px;
          border: none;
          position: absolute;
          top: 16px;
          right: 16px;
          padding: 10px;
        "
      >
        👋 ARで表示する
      </button>
    </model-viewer>

    <div class="controls">
      <h2>キャラクター展示</h2>
      <p>
        上のモデルをドラッグして回転できます。<br />スマホの方は右上のボタンからARを体験してください。
      </p>
    </div>

    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"
    ></script>
  </body>
</html>
